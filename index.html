<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DOM </title>
  <!-- React & ReactDOM через CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel для JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <!-- 1. ЦІ ДВА РЯДКИ ПЕРЕВІР В <HEAD> (під Babel) -->
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ========== СТИЛИ (всё из App.css) ========== */
    :root {
      --accent: #a855f7;
      --bg: #000000;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #fff;
      --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; background:var(--bg); color:var(--text); font-family:'Montserrat',sans-serif; }
    body::before {
      content:''; position:fixed; top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle at 80% 20%, rgba(168,85,247,0.15) 0%, transparent 45%),
                  radial-gradient(circle at 20% 80%, rgba(168,85,247,0.1) 0%, transparent 45%);
      filter:blur(80px); z-index:-1;
    }
    .app { width:100%; height:100%; }

    .menu-container {
      width:100%; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 60px 5vw; animation: fadeInUp 0.6s ease;
    }
    .title {
      font-size: clamp(4rem, 12vw, 7rem); font-weight:900; text-transform:uppercase; letter-spacing:-4px;
      background: linear-gradient(180deg, #FFFFFF 30%, #555555 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter: drop-shadow(0 0 25px rgba(168,85,247,0.4)); animation: titlePulse 3s infinite alternate;
      margin: 0 0 20px 0; line-height:1.1;
    }
    .subtitle {
      font-size:1rem; text-transform:uppercase; letter-spacing:6px; opacity:0.6; margin:15px 0 50px; font-weight:700;
    }
    .cta-btn {
      background: linear-gradient(135deg, #7c3aed, var(--accent));
      color:#fff; border:none; padding:24px 60px; border-radius:16px; font-size:1.4rem; font-weight:900;
      text-transform:uppercase; cursor:pointer; transition:0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:0 10px 40px rgba(139,92,246,0.5); margin-bottom:40px; letter-spacing:2px;
    }
    .cta-btn:hover { transform: translateY(-6px) scale(1.02); box-shadow:0 20px 60px rgba(139,92,246,0.8); }
    .features-grid {
      display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:25px; width:100%; max-width:1100px;
    }
    .feature-card {
      background:var(--glass); border:1px solid var(--border); border-radius:32px; padding:40px;
      backdrop-filter:blur(20px); transition:0.3s;
    }
    .feature-card:hover { border-color:var(--accent); background:rgba(168,85,247,0.05); transform:translateY(-5px); }
    .feature-card h3 { font-size:1.6rem; margin:0 0 15px; text-transform:uppercase; color:var(--accent); font-weight:900; }
    .feature-card p { font-size:1.05rem; line-height:1.7; opacity:0.7; }

    .simple-menu {
      justify-content: center;
      gap: 30px;
    }
    .simple-menu .title {
      font-size: clamp(3rem, 10vw, 5rem);
      margin-bottom: 10px;
    }
    .menu-subtitle {
      font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; 
      color: var(--accent); opacity: 0.8; margin-bottom: 40px; font-weight: 600;
    }
    .menu-card {
      background: rgba(20, 20, 30, 0.95); 
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
      backdrop-filter: blur(20px);
    }
    .menu-card-title {
      font-size: 1.8rem;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2rem;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .simple-auth-card {
      background: transparent;
      border: none;
      padding: 0;
      width: 100%;
      max-width: 450px;
      box-shadow: none;
      text-align: center;
    }
    .auth-title {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    .simple-auth-title {
      font-size: 2.2rem;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .simple-auth-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2rem;
      font-weight: 400;
    }
    .simple-input {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
    }
    .simple-input:focus {
      border-color: var(--accent) !important;
      background: rgba(168, 85, 247, 0.03) !important;
    }
    .simple-auth-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: 0.3s;
      letter-spacing: 2px;
      font-size: 1rem;
    }
    .simple-auth-btn:hover {
      background: #9333ea;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
    }

    .auth-fullscreen {
      width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg);
    }
    .auth-card {
      background:rgba(20,20,30,0.95); border:2px solid var(--accent); padding:3rem 2.5rem; border-radius:24px;
      width:100%; max-width:450px; text-align:center; backdrop-filter:blur(20px);
      box-shadow: 0 0 30px rgba(168,85,247,0.3);
    }
    .auth-card .auth-title { font-size:0.9rem; color:var(--accent); letter-spacing:4px; text-transform:uppercase; margin-bottom:2rem; opacity:0.8; }
    .auth-card h2 { font-size:2.5rem; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:2px; color:var(--accent); }
    .auth-card .auth-subtitle { font-size:0.95rem; color:rgba(255,255,255,0.6); margin-bottom:2rem; }
    .auth-error { color:var(--danger); margin-bottom:1rem; font-size:0.9rem; }
    .auth-form-group { margin-bottom:1.5rem; text-align:left; }
    .auth-form-group label { display:block; font-size:0.85rem; color:var(--accent); text-transform:uppercase; margin-bottom:0.5rem; letter-spacing:1px; }
    .auth-input {
      width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:14px 18px;
      border-radius:12px; color:#fff; font-size:1rem; outline:none; transition:0.3s;
      font-family:inherit;
    }
    .auth-input::placeholder { color:rgba(255,255,255,0.4); }
    .auth-input:focus { border-color:var(--accent); box-shadow:0 0 16px rgba(168,85,247,0.4); background:rgba(168,85,247,0.05); }
    .password-field { position:relative; }
    .password-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer; font-size:1.2rem; padding:0; }
    .password-toggle:hover { color:var(--accent); }
    .auth-forgot { text-align:right; font-size:0.85rem; margin-top:0.5rem; }
    .auth-forgot a { color:var(--accent); text-decoration:none; cursor:pointer; transition:0.2s; }
    .auth-forgot a:hover { text-decoration:underline; }
    .auth-btn {
      width:100%; background:var(--accent); color:#000; border:none; padding:16px; border-radius:14px;
      font-weight:700; text-transform:uppercase; cursor:pointer; margin-top:1.5rem; transition:0.3s;
      letter-spacing:2px; font-size:1rem;
    }
    .auth-btn:hover { background:#9333ea; box-shadow:0 0 20px rgba(168,85,247,0.6); }
    .auth-btn:hover { background:#9333ea; }
    .auth-switch { margin-top:1.5rem; font-size:0.9rem; color:rgba(255,255,255,0.7); }
    .auth-switch span { color:var(--accent); cursor:pointer; font-weight:600; transition:0.2s; text-decoration:underline; }
    .auth-switch span:hover { color:#c084fc; }

    .main-layout { display:flex; height:100vh; width:100%; }
    .sidebar {
      width:250px; background:rgba(10,10,10,0.9); border-right:1px solid var(--border);
      display:flex; flex-direction:column; backdrop-filter:blur(20px); z-index:10;
    }
    .sidebar-header { padding:25px 20px; border-bottom:1px solid var(--border); }
    .sidebar-logo { font-size:2rem; font-weight:900; color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-bottom:5px; }
    .sidebar-user { font-size:0.9rem; opacity:0.7; }
    .sidebar-nav { flex:1; padding:20px 10px; }
    .sidebar-btn {
      display:block; width:100%; background:transparent; border:none; color:var(--text-secondary);
      padding:12px 15px; border-radius:10px; text-align:left; font-size:1rem; cursor:pointer; transition:0.2s; margin-bottom:5px;
    }
    .sidebar-btn:hover { background:rgba(168,85,247,0.1); color:#fff; }
    .sidebar-btn.active { background:rgba(168,85,247,0.15); color:var(--accent); font-weight:600; }
    .sidebar-btn-locked {
      display:block; width:100%; background:rgba(0,0,0,0.5); border:none; color:rgba(255,255,255,0.3);
      padding:12px 15px; border-radius:10px; text-align:left; font-size:1rem; cursor:not-allowed; margin-bottom:5px;
      position:relative; font-weight:500; opacity:0.6;
    }
    .sidebar-btn-locked:hover { background:rgba(0,0,0,0.6); }
    .lock-overlay {
      position:absolute; left:5px; top:50%; transform:translateY(-50%); font-size:1.3rem; margin-right:8px;
      animation: barricade-pulse 1.5s infinite;
    }
    @keyframes barricade-pulse {
      0%, 100% { opacity:1; }
      50% { opacity:0.7; }
    }
    .sidebar-settings { position:relative; }
    .settings-submenu {
      position:absolute; left:100%; top:0; background:#111; border:1px solid var(--border); border-radius:10px;
      padding:5px; min-width:160px; z-index:20;
    }
    .settings-submenu button {
      display:block; width:100%; background:transparent; border:none; color:var(--text); padding:8px 12px;
      text-align:left; cursor:pointer; border-radius:6px;
    }
    .settings-submenu button:hover { background:rgba(168,85,247,0.2); }
    .sidebar-dombro {
      padding: 15px 20px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: flex-start; gap: 5px;
    }
    .sidebar-dombro .sidebar-btn { margin-bottom: 0; font-weight: 600; }
    .sidebar-balance { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-left: 10px; }
    .sidebar-footer { padding:20px; border-top:1px solid var(--border); font-size:0.8rem; opacity:0.5; text-align:center; }
    .content-area {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      overflow:auto; position:relative;
    }

    .dashboard-title {
      font-size: clamp(4rem, 12vw, 7rem); font-weight:900; text-transform:uppercase; letter-spacing:-4px;
      background: linear-gradient(180deg, #FFFFFF 30%, #555555 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter: drop-shadow(0 0 25px rgba(168,85,247,0.4)); margin-bottom:20px; line-height:1.1;
    }
    .dashboard-desc { max-width:600px; opacity:0.8; font-size:1.1rem; line-height:1.6; text-align:center; }

    .battle-layout { display: flex; width: 100%; height: 100%; gap: 20px; padding: 10px; box-sizing: border-box; }
    .battle-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; overflow: auto; }
    .battle-top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .battle-top-bar h2 { font-size: 1.3rem; }
    .current-color-swatch { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); }
    .icon-btn {
      background: var(--glass); border: 1px solid var(--border); color: var(--text); width: 44px; height: 44px;
      border-radius: 12px; font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(168, 85, 247, 0.2); }
    .timer {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem; font-weight: 700; margin: 5px 0; color: var(--accent);
      letter-spacing: 1px;
    }
    .zoom-controls { display: flex; gap: 10px; margin: 5px 0; }
    .zoom-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; font-size: 1.3rem; cursor: pointer; }
    .canvas-zoom-wrapper {
      width: min(90vw, 1080px);
      height: min(90vh, 1080px);
      overflow: hidden;
      background: #fff;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      cursor: auto;
      position: relative;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
    }
    .canvas-zoom-wrapper.dragging { cursor: grabbing; }
    .pixel-canvas { display: block; width: 1023px; height: 1023px; transform-origin: top left; image-rendering: crisp-edges; pointer-events: none; }
    .battle-bottom-bar { display: flex; gap: 20px; margin-top: 10px; }
    .right-panel { width: 300px; display: flex; flex-direction: column; gap: 10px; }
    .battle-action-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
    .battle-action-btn:hover { background: rgba(168, 85, 247, 0.15); border-color: var(--accent); }
    .action-icon { font-size: 1.1rem; }

    /* Панель выбора цвета (сбоку) */
    .color-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 260px;
      background: rgba(10,10,10,0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 15px;
      z-index: 50;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .color-panel h3 { font-size: 1rem; margin-bottom: 5px; }
    .color-palette { display: flex; flex-direction: column; gap: 6px; }
    .color-row { display: flex; justify-content: center; gap: 6px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: 0.2s;
    }
    .color-swatch:hover { border-color: #fff; transform: scale(1.1); }
    .color-swatch.selected { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .color-close-btn {
      background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px;
      font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 5px;
    }
    .color-close-btn:hover { background: #9333ea; }

    .chat-panel { width: 280px; height: 100%; background: rgba(10,10,10,0.9); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 600; flex-shrink: 0; }
    .chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { font-size: 0.85rem; display: flex; gap: 6px; }
    .chat-time { color: var(--text-secondary); font-size: 0.75rem; white-space: nowrap; }
    .system-text { color: #a78bfa; }
    .chat-author { color: var(--accent); font-weight: 600; }
    .chat-input-area { display: flex; padding: 10px; gap: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send-btn { background: var(--accent); color: #fff; border: none; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .chat-send-btn:hover { background: #9333ea; }
    .mute-notice { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; color: var(--danger); font-size: 0.9rem; }

    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:30; }
    .modal-card { background:#1a1a1a; border:1px solid var(--border); border-radius:20px; padding:2rem; width:400px; text-align:center; }
    .modal-card h3 { margin-bottom:1rem; }
    .color-modal { width:auto; max-width:90vw; } /* больше не используется, но оставим */
    .profile-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:10px; border-radius:8px; color:#fff; margin:10px 0; }
    .modal-save-btn, .modal-cancel-btn { padding:8px 20px; border-radius:8px; border:none; cursor:pointer; }
    .modal-save-btn { background:var(--accent); color:#fff; }
    .modal-cancel-btn { background:transparent; border:1px solid var(--border); color:var(--text); }

    .payment-options { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .payment-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--glass); }
    .payment-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--accent); }
    .payment-btn.paypal { background: #003087; border-color: #003087; }
    .payment-btn.paypal:hover { background: #001f6e; }
    .payment-btn.stripe { background: #635bff; border-color: #635bff; }
    .payment-btn.stripe:hover { background: #4c42e0; }
    .payment-btn.test { background: var(--accent); border-color: var(--accent); }
    .payment-btn.test:hover { background: #9333ea; }

    .pixel-tooltip {
      position:fixed; background:rgba(0,0,0,0.9); color:#fff; padding:8px 14px; border-radius:8px;
      font-size:0.85rem; pointer-events:none; z-index:40; border:1px solid var(--accent);
      box-shadow:0 4px 12px rgba(168,85,247,0.4); white-space:normal; max-width:200px;
    }
    .pixel-tooltip .tooltip-clan { opacity: 0.7; font-size: 0.8rem; margin-top: 3px; }

    .notification { position:fixed; bottom:30px; right:30px; background:#1e1e1e; border:1px solid var(--accent); padding:1rem 1.5rem; border-radius:12px; color:#fff; z-index:50; display:flex; align-items:center; gap:15px; box-shadow:0 0 20px rgba(168,85,247,0.5); animation: slideIn 0.3s ease; }
    .notification-close { background:none; border:none; color:var(--text-secondary); font-size:1.2rem; cursor:pointer; }
    @keyframes slideIn { from{ opacity:0; transform:translateX(100px); } to{ opacity:1; transform:translateX(0); } }

    .admin-panel { width:100%; max-width:800px; padding:2rem; }
    .admin-panel h2 { font-size:2rem; margin-bottom:1rem; }
    .admin-message { color:var(--accent); margin-bottom:1rem; }
    .admin-tabs { display:flex; gap:10px; margin-bottom:1.5rem; }
    .admin-tab { background:var(--glass); border:1px solid var(--border); color:var(--text-secondary); padding:10px 20px; border-radius:10px; font-size:0.95rem; cursor:pointer; transition:0.2s; }
    .admin-tab.active { background:rgba(168,85,247,0.15); color:var(--accent); border-color:var(--accent); }
    .user-list h3, .functions-list h3, .reports-list h3 { margin-bottom:1rem; }
    .user-table { width:100%; border-collapse:collapse; margin-top:10px; }
    .user-table th, .user-table td { padding:12px 15px; text-align:left; border-bottom:1px solid var(--border); }
    .user-table th { opacity:0.7; font-weight:600; text-transform:uppercase; font-size:0.85rem; }
    .role-badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:600; }
    .role-badge.owner { background:rgba(217,119,6,0.3); color:#fbbf24; }
    .role-badge.admin { background:rgba(168,85,247,0.2); color:var(--accent); }
    .role-badge.user { background:rgba(255,255,255,0.05); color:var(--text-secondary); }
    .actions-cell { display:flex; gap:8px; flex-wrap:wrap; }
    .action-small-btn { background:transparent; border:1px solid var(--border); color:var(--text-secondary); padding:5px 12px; border-radius:6px; font-size:0.8rem; cursor:pointer; transition:0.2s; }
    .action-small-btn:hover { background:rgba(168,85,247,0.1); color:#fff; border-color:var(--accent); }
    .action-small-btn.promote { border-color:var(--accent); color:var(--accent); }
    .action-small-btn.demote { border-color:#f59e0b; color:#f59e0b; }
    .action-small-btn.danger { border-color:var(--danger); color:var(--danger); }
    .action-small-btn.danger:hover { background:rgba(239,68,68,0.15); }
    .functions-list { display:flex; flex-direction:column; gap:15px; }

    .report-page { width:100%; max-width:700px; padding:2rem; }
