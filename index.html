    .report-textarea:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(168,85,247,0.3); }
    .report-actions { display:flex; gap:15px; margin-top:1.5rem; justify-content:center; }
    .status-select { background:#1a1a1a; color:#fff; border:1px solid var(--border); padding:5px 10px; border-radius:6px; font-size:0.8rem; outline:none; }
    .status-select option { background:#1a1a1a; color:#fff; }
    .status-badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:600; }
    .status-unread { background:rgba(255,255,255,0.05); color:var(--text-secondary); }
    .status-approved { background:rgba(34,197,94,0.15); color:#4ade80; }
    .status-pending { background:rgba(234,179,8,0.15); color:#facc15; }
    .status-rejected { background:rgba(239,68,68,0.15); color:#f87171; }

    .friends-page { width:100%; max-width:960px; padding:2rem; text-align:center; margin:0 auto; }
    .friends-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .friend-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 20px;
      text-align: left;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .friend-panel h3 { margin: 0; font-size: 1.1rem; color: var(--accent); }
    .friend-empty {
      margin-top: 12px;
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      padding: 18px;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      text-align: center;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .friend-list { display: flex; flex-direction: column; gap: 10px; }
    .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
    .friend-item span { font-size: 0.95rem; }
    .friend-item small { color: rgba(255,255,255,0.65); }

    .dombro-page { padding: 2rem; text-align: center; }
    .dombro-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .balance-badge { background: var(--accent); padding: 8px 20px; border-radius: 20px; font-weight: 600; }
    .dombro-scroll {
      overflow-x: hidden;
      padding-bottom: 10px;
    }
    .dombro-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 0 auto;
      max-width: 1200px;
    }
    .dombro-card {
      background: linear-gradient(145deg, #fbbf24, #d97706);
      border-radius: 16px;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      width: 160px;
      flex-shrink: 0;
    }
    .dombro-amount { font-size: 1.3rem; }
    .dombro-price { font-size: 1.1rem; color: #000; opacity: 0.8; }
    .dombro-buy-btn { background: #000; color: #fbbf24; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .dombro-buy-btn:hover { background: #1a1a1a; }

    .clan-page { padding: 2rem; text-align: center; max-width: 500px; }
    .clan-create { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
    .clan-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; outline: none; }
    .clan-input:focus { border-color: var(--accent); }
    .clan-create-btn { background: var(--accent); border: none; color: #fff; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .clan-create-btn:hover { background: #9333ea; }
    .clan-info { margin: 20px 0; }
    .clan-message { margin-top: 10px; color: var(--accent); }

    .admin-add-coins { margin-top: 20px; padding: 15px; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; gap: 10px; max-width: 300px; }
    .admin-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; color: #fff; outline: none; }
    .admin-input:focus { border-color: var(--accent); }
    .admin-add-btn { background: var(--accent); border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .admin-add-btn:hover { background: #9333ea; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes titlePulse {
      0% { filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.3)); }
      100% { filter: drop-shadow(0 0 45px rgba(168, 85, 247, 0.7)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --------------- Firebase инициализация ---------------
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyAxRMjebhn73-Zw35dQ7CDr-vj7CVEAyH4",
      authDomain: "dom1k-ec9a5.firebaseapp.com",
      projectId: "dom1k-ec9a5",
      storageBucket: "dom1k-ec9a5.firebasestorage.app",
      messagingSenderId: "1305548987589",
      appId: "1:1305548987589:web:41a04a4a94342a0fb03b4ac"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    // Owner UID from Firebase — hardcoded protected owner account
    const OWNER_UID = 'iCKtMg2IL6OCNVTBag4hpSw4YbY2';

    // --------------- localStorage helpers ---------------
    const USERS_KEY = 'dom_users';
    const CURRENT_USER_KEY = 'dom_currentUser';
    const CANVAS_KEY = 'dom_canvas';
    const LAST_PIXEL_KEY = 'dom_lastPixelTime';
    const INFINITE_PAINT_KEY = 'dom_infinitePaint';
    const REPORTS_KEY = 'dom_reports';

    const loadUsers = () => {
      const saved = localStorage.getItem(USERS_KEY);
      if (saved) {
        try {
          const users = JSON.parse(saved);
          return users.map(u => ({
            email: u.email || u.username || '', // Для совместимости со старыми пользователями
            username: u.username || u.email || '', // Уникальный username
            displayName: u.displayName || u.username || '', // Отображаемое имя
            password: u.password,
            role: u.role,
            score: u.score || 0,
            balance: u.balance || 0,
            clan: u.clan || null,
            muted: u.muted || false,
            muteReason: u.muteReason || ''
          }));
        } catch { return []; }
      }
        // No default users created here - rely on Firebase-authenticated users.
        return [];
    };

    const saveUsers = (users) => localStorage.setItem(USERS_KEY, JSON.stringify(users));

    const getCurrentUser = () => {
      const saved = localStorage.getItem(CURRENT_USER_KEY);
      return saved ? JSON.parse(saved) : null;
    };

    const setCurrentUser = (user) => {
      if (user) {
        localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
      } else {
        localStorage.removeItem(CURRENT_USER_KEY);
      }
    };

    const emptyGrid = (size = 93) => Array(size).fill().map(() => Array(size).fill(null));

    const loadCanvas = (size = 93) => {
      const saved = localStorage.getItem(CANVAS_KEY);
      return saved ? (() => { try { return JSON.parse(saved); } catch { return emptyGrid(size); } })() : emptyGrid(size);
    };

    const saveCanvas = (grid) => localStorage.setItem(CANVAS_KEY, JSON.stringify(grid));

    const getLastPixelTime = () => {
      const val = localStorage.getItem(LAST_PIXEL_KEY);
      return val ? parseInt(val, 10) : 0;
    };

    const setLastPixelTime = (time) => localStorage.setItem(LAST_PIXEL_KEY, time.toString());

    const getInfinitePaint = () => {
      return localStorage.getItem(INFINITE_PAINT_KEY) === 'true';
    };

    const setInfinitePaint = (enabled) => {
      localStorage.setItem(INFINITE_PAINT_KEY, enabled ? 'true' : 'false');
    };

    const loadReports = () => {
      const saved = localStorage.getItem(REPORTS_KEY);
      if (saved) {
        try {
          const reports = JSON.parse(saved);
          return reports.map(r => ({
            id: r.id || Date.now() + Math.random(),
            author: r.author,
            text: r.text,
            timestamp: r.timestamp,
            status: r.status || 'unread'
          }));
        } catch { return []; }
      }
      return [];
    };

    const saveReports = (reports) => localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));

    // --------------- Firebase REST API helpers ---------------
    const FIREBASE_DB = 'https://dom1k-ec9a5.firebaseio.com';

    const saveUserToFirebase = async (user) => {
      try {
        const email = user.email.replace(/[.#$/\[\]]/g, '_');
        const response = await fetch(`${FIREBASE_DB}/users/${email}.json`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        });
        if (response.ok) {
          console.log('✓ Пользователь сохранён в Firebase:', user.email);
        }
      } catch (error) {
        console.warn('⚠️ Firebase save error:', error.message);
        // Продолжаем работу с localStorage
      }
    };

    const loadUserFromFirebase = async (email) => {
      try {
        const emailKey = email.replace(/[.#$/\[\]]/g, '_');
        const response = await fetch(`${FIREBASE_DB}/users/${emailKey}.json`);
        if (response.ok) {
          const user = await response.json();
          if (user) {
            console.log('✓ Пользователь загружен из Firebase:', email);
            return user;
          }
        }
      } catch (error) {
        console.warn('⚠️ Firebase load error:', error.message);
      }
      return null;
    };

    // --------------- Палитра цветов ---------------
    const colorPalette = [
      ['#FFFFFF', '#C0C0C0', '#808080', '#000000'],
      ['#4B3621', '#795548', '#F5DEB3', '#800000', '#FF0000'],
      ['#FF2400', '#C71585', '#FF69B4', '#DC143C', '#FF4500'],
      ['#FFA500', '#FFFF00', '#FFFDD0', '#7CFC00', '#00FF00'],
      ['#006400', '#40E0D0', '#0000FF', '#000080', '#00BFFF'],
      ['#87CEFA', '#87CEEB', '#4B0082', '#E6E6FA', '#800080'],
      ['#8A2BE2']
    ];
    const defaultColor = '#000000';

    // --------------- Уведомление ---------------
    const Notification = ({ message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 2500);
        return () => clearTimeout(timer);
      }, [onClose]);
      return (
        <div className="notification">
          <span>{message}</span>
          <button onClick={onClose} className="notification-close">×</button>
        </div>
      );
    };

    // --------------- Главное меню ---------------
    const MainMenu = ({ onStart }) => {
      const [mode, setMode] = useState('login'); // 'login' | 'register-email' | 'register-profile'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [displayName, setDisplayName] = useState('');
      const [username, setUsername] = useState('');
      const [error, setError] = useState('');

      // Валидация email
      const isValidEmail = (email) => {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      };

      // Валидация username (латиница, цифры, underscore)
      const isValidUsername = (username) => {
        return /^[a-zA-Z0-9_]{3,16}$/.test(username);
      };

      // Обработка регистрации - этап 1
      const handleRegisterStep1 = () => {
        if (!email.trim()) {
          setError('Введи e-mail');
          return;
        }
        if (!isValidEmail(email)) {
          setError('Неверный формат e-mail');
          return;
        }
        if (!password.trim()) {
          setError('Введи пароль');
          return;
        }
        if (password.trim().length < 6) {
          setError('Пароль минимум 6 символов');
          return;
        }
        const users = loadUsers();
        if (users.find(u => u.email === email.trim())) {
          setError('Этот e-mail уже зарегистрирован');
          return;
        }
        setError('');
        setMode('register-profile');
      };

      // Обработка регистрации - этап 2
      const handleRegisterStep2 = async () => {
        if (!displayName.trim()) {
          setError('Введи отображаемое имя');
          return;
        }
        if (!username.trim()) {
          setError('Введи никнейм');
          return;
        }
        if (!isValidUsername(username)) {
          setError('Никнейм: 3-16 символов (латиница, цифры, _)');
          return;
        }
        const users = loadUsers();
        if (users.find(u => u.username === username.trim().toLowerCase())) {
          setError('Этот никнейм уже занят');
          return;
        }

                try {
          await auth.createUserWithEmailAndPassword(email.trim(), password.trim());
        } catch (error) {
          setError(error.message);
          return;
        }

        // Map Firebase UID to owner if it matches
        const fbUser = auth.currentUser;
        const uid = fbUser?.uid;
        const assignedRole = uid === OWNER_UID ? 'owner' : 'user';

        // Save to Firestore
        try {
          await db.collection("users").doc(uid).set({
            email: email.trim(),
            role: assignedRole
          });
           
          
          // Варіант 2: Якщо це React (все на одному екрані), попросимо очистити поля
          // setEmail('');
          // setPassword('');
          // =================================
          
        } catch (error) {
          console.warn('Firestore save error:', error.message);
        }

        // Создаём нового пользователя
        const newUser = {
          email: email.trim(),
          password: password.trim(),
          username: username.trim().toLowerCase(),
          displayName: displayName.trim(),
          role: assignedRole,
          uid: uid || null,
          score: 0,
          balance: 0,
          clan: null,
          muted: false,
          muteReason: ''
        };
        users.push(newUser);
        saveUsers(users);
        
        // Сохраняем в Firebase REST API параллельно
        saveUserToFirebase(newUser);
        
        setCurrentUser(newUser);
        onStart(newUser);
      };

      // Обработка входа
      const handleLogin = async () => {
        if (!email.trim() || !password.trim()) {
          setError('Заполни все поля');
          return;
        }
        try {
          await auth.signInWithEmailAndPassword(email.trim(), password.trim());
        } catch (error) {
          setError(error.message);
          return;
        }

        const fbUser = auth.currentUser;
        const uid = fbUser?.uid;

        let roleFromFirestore = 'user';
        
        // Check if this is the owner
        if (uid === OWNER_UID) {
          roleFromFirestore = 'owner';
        } else {
          // Fetch role from Firestore
          try {
            const userDoc = await db.collection("users").doc(uid).get();
            if (userDoc.exists) {
              const userData = userDoc.data();
              roleFromFirestore = userData.role || 'user';
            }
          } catch (error) {
            console.warn('Firestore fetch error:', error.message);
          }
        }

        const users = loadUsers();
        let user = users.find(u => u.email === email.trim() && u.password === password.trim());
        if (!user) {
          const fallbackUsername = email.trim().split('@')[0].replace(/[^a-zA-Z0-9_]/g, '_').toLowerCase() || 'user';
          user = {
            email: email.trim(),
            password: password.trim(),
            username: fallbackUsername,
            displayName: email.trim(),
            role: roleFromFirestore,
            uid: uid || null,
            score: 0,
            balance: 0,
            clan: null,
            muted: false,
            muteReason: ''
          };
          users.push(user);
          saveUsers(users);
        } else {
          // Update role from Firestore
          if (user.role !== roleFromFirestore) {
            user.role = roleFromFirestore;
            user.uid = uid;
            saveUsers(users.map(u => u.email === user.email ? user : u));
          }
        }
        setCurrentUser(user);
        onStart(user);
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter') {
          if (mode === 'login') handleLogin();
          else if (mode === 'register-email') handleRegisterStep1();
          else if (mode === 'register-profile') handleRegisterStep2();
        }
      };

      return (
        <div className="menu-container simple-menu">
          <div className="simple-auth-card">
            <div className="auth-title">DOM</div>
            
            {mode === 'login' && (
              <>
                <h2 className="simple-auth-title">Вход</h2>
                <p className="simple-auth-subtitle">Пожалуйста, введите ваши данные</p>
                
                {error && <div className="auth-error">⚠️ {error}</div>}

                <div className="auth-form-group">
                  <label>E-Mail</label>
                  <input 
                    type="email" 
                    className="auth-input simple-input" 
                    placeholder="bro@gmail.com" 
                    value={email} 
                    onChange={e => setEmail(e.target.value)}
                    onKeyPress={handleKeyPress}
                  />
                </div>

                <div className="auth-form-group">
                  <label>Пароль</label>
                  <div className="password-field">
                    <input 
                      type={showPassword ? 'text' : 'password'} 
                      className="auth-input simple-input" 
                      placeholder="••••••••" 
                      value={password} 
                      onChange={e => setPassword(e.target.value)}
                      onKeyPress={handleKeyPress}
                    />
                    <button 
                      type="button"
                      className="password-toggle" 
                      onClick={() => setShowPassword(!showPassword)}
                    >
                      {showPassword ? '👁️' : '👁️‍🗨️'}
                    </button>
                  </div>
                  <div className="auth-forgot">
                    <a>Забыли пароль?</a>
                  </div>
                </div>

                <button className="simple-auth-btn" onClick={handleLogin}>
                  Войти
                </button>

                <p className="auth-switch">
                  Еще нет аккаунта?{' '}
                  <span onClick={() => { setMode('register-email'); setEmail(''); setPassword(''); setError(''); }}>
                    Создать аккаунт
                  </span>
                </p>
              </>
            )}

            {mode === 'register-email' && (
              <>
                <h2 className="simple-auth-title">Регистрация</h2>
                <p className="simple-auth-subtitle">Шаг 1/2: Данные для входа</p>
                
                {error && <div className="auth-error">⚠️ {error}</div>}

                <div className="auth-form-group">
                  <label>E-Mail</label>
                  <input 
                    type="email" 
                    className="auth-input simple-input" 
                    placeholder="bro@gmail.com" 
                    value={email} 
                    onChange={e => setEmail(e.target.value)}
                    onKeyPress={handleKeyPress}
                  />
                  <small style={{color: 'rgba(255,255,255,0.5)', fontSize: '0.8rem', marginTop: '5px', display: 'block'}}>
                    Используй настоящий e-mail
                  </small>
                </div>

                <div className="auth-form-group">
                  <label>Пароль</label>
                  <div className="password-field">
                    <input 
                      type={showPassword ? 'text' : 'password'} 
                      className="auth-input simple-input" 
                      placeholder="••••••••" 
                      value={password} 
                      onChange={e => setPassword(e.target.value)}
                      onKeyPress={handleKeyPress}
                    />
                    <button 
                      type="button"
                      className="password-toggle" 
                      onClick={() => setShowPassword(!showPassword)}
                    >
                      {showPassword ? '👁️' : '👁️‍🗨️'}
                    </button>
                  </div>
                </div>

                <button className="simple-auth-btn" onClick={handleRegisterStep1}>
                  Далее
                </button>

                <p className="auth-switch">
                  Уже есть аккаунт?{' '}
                  <span onClick={() => { setMode('login'); setError(''); }}>
                    Войти
                  </span>
                </p>
              </>
            )}

            {mode === 'register-profile' && (
              <>
                <h2 className="simple-auth-title">Регистрация</h2>
                <p className="simple-auth-subtitle">Шаг 2/2: Профиль</p>
                
                {error && <div className="auth-error">⚠️ {error}</div>}

                <div className="auth-form-group">
                  <label>Отображаемое имя</label>
                  <input 
                    type="text" 
                    className="auth-input simple-input" 
                    placeholder="Как тебя будут видеть другие" 
                    value={displayName} 
                    onChange={e => setDisplayName(e.target.value)}
                    onKeyPress={handleKeyPress}
                  />
                </div>

                <div className="auth-form-group">
                  <label>Никнейм</label>
                  <input 
                    type="text" 
                    className="auth-input simple-input" 
                    placeholder="nickname_123" 
                    value={username} 
                    onChange={e => setUsername(e.target.value)}
                    onKeyPress={handleKeyPress}
                  />
                  <small style={{color: 'rgba(255,255,255,0.5)', fontSize: '0.8rem', marginTop: '5px', display: 'block'}}>
                    3-16 символов (латиница, цифры, _) - уникальный для профиля
                  </small>
                </div>

                <button className="simple-auth-btn" onClick={handleRegisterStep2}>
                  Создать аккаунт
                </button>

                <p className="auth-switch">
                  <span onClick={() => { setMode('register-email'); setError(''); }} style={{cursor: 'pointer', textDecoration: 'underline'}}>
                    Вернуться назад
                  </span>
                </p>
              </>
            )}
          </div>
        </div>
      );
    };

    // --------------- Авторизация ---------------
    const AuthScreen = ({ onLogin }) => {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = () => {
        if (!email.trim() || !password.trim()) {
          setError('Заполни все поля');
          return;
        }
        const users = loadUsers();
        if (mode === 'register') {
          if (users.find(u => u.username === email.trim())) {
            setError('Пользователь с таким e-mail уже существует');
            return;
          }
          const newUser = {
            username: email.trim(),
            password: password.trim(),
            role: 'user',
            score: 0,
            balance: 0,
            clan: null,
            muted: false,
            muteReason: ''
          };
          users.push(newUser);
          saveUsers(users);
          setCurrentUser(newUser);
          onLogin(newUser);
        } else {
          const user = users.find(u => u.username === email.trim() && u.password === password.trim());
          if (!user) {
            setError('Неверный e-mail или пароль');
            return;
          }
          const freshUser = users.find(u => u.username === user.username);
          setCurrentUser(freshUser);
          onLogin(freshUser);
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter') handleSubmit();
      };

      return (
        <div className="auth-fullscreen">
          <div className="auth-card">
            <div className="auth-title">dom</div>
            <h2>{mode === 'login' ? 'Вход' : 'Регистрация'}</h2>
            <p className="auth-subtitle">{mode === 'login' ? 'Пожалуйста, введите ваши данные' : 'Пожалуйста, введите ваши данные.'}</p>
            {error && <div className="auth-error">⚠️ {error}</div>}
            <div className="auth-form-group">
              <label>E-Mail</label>
              <input 
                type="email" 
                className="auth-input" 
                placeholder="user@gmail.com" 
                value={email} 
                onChange={e => setEmail(e.target.value)}
                onKeyPress={handleKeyPress}
              />
            </div>
            <div className="auth-form-group">
              <label>Пароль</label>
              <div className="password-field">
                <input 
                  type={showPassword ? 'text' : 'password'} 
                  className="auth-input" 
                  placeholder="••••••••••••" 
                  value={password} 
                  onChange={e => setPassword(e.target.value)}
                  onKeyPress={handleKeyPress}
                />
                <button 
                  type="button"
                  className="password-toggle" 
                  onClick={() => setShowPassword(!showPassword)}
                  title={showPassword ? 'Скрыть' : 'Показать'}
                >
                  {showPassword ? '👁️' : '👁️‍🗨️'}
                </button>
              </div>
              {mode === 'login' && (
                <div className="auth-forgot">
                  <a>Забыли пароль?</a>
                </div>
              )}
            </div>
            <button className="auth-btn" onClick={handleSubmit}>{mode === 'login' ? 'Войти' : 'Создать аккаунт'}</button>
            <p className="auth-switch">
              {mode === 'login' ? 'Еще нет аккаунта?' : 'Уже есть аккаунт?'}{' '}
              <span onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(''); }}>
                {mode === 'login' ? 'Создать аккаунт' : 'Войти'}
              </span>
            </p>
          </div>
        </div>
      );
    };

    // --------------- Друзья ---------------
    const FriendsPage = () => {
      const requestsToYou = [];
      const requestsFromYou = [];

      return (
        <div className="friends-page">
          <h2>🍋‍🟩Друзья</h2>
          <p style={{ opacity: 0.75, marginTop: 8 }}>Здесь будут входящие и исходящие заявки в друзья.</p>
          <div className="friends-row">
            <div className="friend-panel">
              <h3>Тебе предлагают дружить</h3>
              {requestsToYou.length === 0 ? (
                <div className="friend-empty">Сейчас тут пусто</div>
              ) : (
                <div className="friend-list">
                  {requestsToYou.map((item, idx) => (
                    <div key={idx} className="friend-item">
                      <span>{item.name}</span>
                      <small>{item.reason || 'Заявка в друзья'}</small>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="friend-panel">
              <h3>Кому ты предлагаешь дружить</h3>
              {requestsFromYou.length === 0 ? (
                <div className="friend-empty">Сейчас тут пусто</div>
              ) : (
                <div className="friend-list">
                  {requestsFromYou.map((item, idx) => (
                    <div key={idx} className="friend-item">
                      <span>{item.name}</span>
                      <small>{item.status || 'Ожидает ответа'}</small>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --------------- Модальное окно оплаты ---------------
    const PaymentModal = ({ amount, price, onClose, onSuccess }) => {
      const handlePayPal = () => {
        alert('PayPal оплата в разработке. Демо: начисляем валюту.');
        onSuccess(amount);
        onClose();
      };

      const handleStripe = () => {
        alert('Stripe оплата в разработке. Демо: начисляем валюту.');
        onSuccess(amount);
        onClose();
      };

      const handleTest = () => {
        onSuccess(amount);
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <h3>Покупка пакета DOMBRO</h3>
            <p style={{ marginBottom: 8, opacity: 0.8 }}>Вы выбрали <strong>{amount} DC</strong></p>
            <p style={{ marginBottom: 20 }}>Цена: <strong>${price}</strong></p>
            <div className="payment-options">
              <button className="payment-btn paypal" onClick={handlePayPal}>Оплатить через PayPal</button>
              <button className="payment-btn stripe" onClick={handleStripe}>Оплатить через Stripe</button>
              <button className="payment-btn test" onClick={handleTest}>Тестовое начисление</button>
            </div>
            <button className="modal-cancel-btn" style={{ marginTop: 15 }} onClick={onClose}>Отмена</button>
          </div>
        </div>
      );
    };

    // --------------- DOMBRO магазин ---------------
    const DomBroShop = ({ user, onUserUpdate }) => {
      const [showPayment, setShowPayment] = useState(null);
      const amounts = [
        { amount: 50, price: 1.99 },
        { amount: 100, price: 2.99 },
        { amount: 150, price: 3.99 },
        { amount: 200, price: 4.99 },
        { amount: 300, price: 6.99 },
        { amount: 500, price: 9.99 },
        { amount: 1000, price: 14.99 },
        { amount: 1500, price: 19.99 },
        { amount: 2000, price: 24.99 },
        { amount: 3000, price: 34.99 },
        { amount: 4000, price: 44.99 },
        { amount: 5000, price: 54.99 },
        { amount: 6000, price: 64.99 },
        { amount: 7000, price: 74.99 },
        { amount: 8000, price: 84.99 },
        { amount: 9000, price: 94.99 },
        { amount: 10000, price: 99.99 }
      ];

      const handlePaymentSuccess = (amount) => {
        const users = loadUsers();
        const idx = users.findIndex(u => u.username === user.username);
        if (idx !== -1) {
          users[idx].balance = (users[idx].balance || 0) + amount;
          saveUsers(users);
          const updated = { ...user, balance: users[idx].balance };
          
          // Сохраняем обновленные данные в Firebase
          saveUserToFirebase(updated);
          
          setCurrentUser(updated);
          onUserUpdate(updated);
        }
      };

      return (
        <div className="dombro-page">
          <div className="dombro-header">
            <div>
              <h2>💰 DOMBRO</h2>
              <p style={{ opacity: 0.75, marginTop: 8 }}>Выберите пакет и пополните баланс</p>
            </div>
            <div className="balance-badge">Баланс: <span>{user.balance || 0}</span> DC</div>
          </div>
          <div className="dombro-scroll">
            <div className="dombro-grid">
              {amounts.map(({ amount, price }) => (
                <div key={amount} className="dombro-card">
                  <div className="dombro-amount">{amount} DC</div>
                  <div className="dombro-price">${price}</div>
                  <button className="dombro-buy-btn" onClick={() => setShowPayment({ amount, price })}>
                    Купить
                  </button>
                </div>
              ))}
            </div>
          </div>

          {showPayment && (
            <PaymentModal
              amount={showPayment.amount}
              price={showPayment.price}
              onClose={() => setShowPayment(null)}
              onSuccess={handlePaymentSuccess}
            />
          )}
        </div>
      );
    };

    // --------------- Кланы ---------------
    const ClanPage = ({ user, onUserUpdate }) => {
      const [clanName, setClanName] = useState('');
      const [message, setMessage] = useState('');

      const handleCreateClan = () => {
        const trimmed = clanName.trim();
        if (!trimmed) return;
        if (user.clan) {
          setMessage('У вас уже есть клан');
          return;
        }
        if ((user.balance || 0) < 1000) {
          setMessage('Недостаточно DOMBRO (нужно 1000)');
          return;
        }
        const users = loadUsers();
        const idx = users.findIndex(u => u.username === user.username);
        if (idx !== -1) {
          users[idx].balance = (users[idx].balance || 0) - 1000;
          users[idx].clan = trimmed;
          saveUsers(users);
          const updated = { ...user, balance: users[idx].balance, clan: trimmed };
          
          // Сохраняем в Firebase
          saveUserToFirebase(updated);
          
          setCurrentUser(updated);
          onUserUpdate(updated);
          setMessage(`Клан "${trimmed}" создан!`);
          setClanName('');
        }
      };

      return (
        <div className="clan-page">
          <h2>⚔️ Кланы</h2>
          {user.clan ? (
            <div className="clan-info">
              <p>Ваш клан: <strong>{user.clan}</strong></p>
            </div>
          ) : (
            <div className="clan-create">
              <p>Создайте свой клан за <strong>1000 DOMBRO</strong></p>
              <input type="text" className="clan-input" placeholder="Название клана" value={clanName} onChange={e => setClanName(e.target.value)} />
              <button className="clan-create-btn" onClick={handleCreateClan}>Создать клан</button>
            </div>
          )}
          {message && <p className="clan-message">{message}</p>}
        </div>
      );
    };

    // --------------- Админ-панель ---------------
    const AdminPanel = ({ currentUser, onUserUpdate }) => {
      const [users, setUsers] = useState(loadUsers());
      const [message, setMessage] = useState('');
      const [activeTab, setActiveTab] = useState('users');
      const [infinitePaint, setInfinitePaintState] = useState(getInfinitePaint());
      const [reports, setReports] = useState(loadReports());
      const [addCoinUser, setAddCoinUser] = useState('');
      const [addCoinAmount, setAddCoinAmount] = useState('');

      const refreshUsers = () => setUsers(loadUsers());

      // Role system: increasing rank = more privileges
      const ROLE_RANK = {
        player: 0,
        ml_admin: 1,
        st_admin: 2,
        zga: 3,
        ga: 4,
        owner: 5,
        // legacy alias
        admin: 1
      };

      const ROLE_LABEL = {
        player: 'Игрок',
        ml_admin: 'Мл.Админ',
        st_admin: 'Ст.Админ',
        zga: 'З.Г.А',
        ga: 'Г.А',
        owner: 'Владелец',
        admin: 'Админ'
      };

      const isAdminRole = (r) => ROLE_RANK[r] >= ROLE_RANK.ml_admin;

      const canManage = (actorRole, targetRole, newRole) => {
        // Owner can do anything
        if (actorRole === 'owner') return true;
        const actorRank = ROLE_RANK[actorRole] || 0;
        const targetRank = ROLE_RANK[targetRole] || 0;
        const newRank = ROLE_RANK[newRole] || 0;
        // Actor must be strictly higher than target and strictly higher than the role they're assigning
        return actorRank > targetRank && actorRank > newRank;
      };

      const availablePromotionRoles = (actorRole) => {
        const actorRank = ROLE_RANK[actorRole] || 0;
        return Object.keys(ROLE_RANK).filter(r => ROLE_RANK[r] < actorRank && r !== 'player');
      };

      const handleChangeRole = (username, newRole) => {
        const target = users.find(u => u.username === username);
        if (!target) return;
        // Protect owner from role changes unless actor is owner
        if (target.role === 'owner' && currentUser.role !== 'owner') {
          setMessage('Нельзя изменить роль владельца');
          return;
        }
        // Permission check
        if (!canManage(currentUser.role, target.role, newRole)) {
          setMessage('У вас недостаточно прав для изменения роли');
          return;
        }
        const updatedUsers = users.map(u => u.username === username ? { ...u, role: newRole } : u);
        saveUsers(updatedUsers);
        
        // Update in Firestore if uid exists
        if (target.uid) {
          db.collection("users").doc(target.uid).update({
            role: newRole
          }).catch(error => console.warn('Firestore update error:', error.message));
        }
        
        refreshUsers();
        if (username === currentUser.username) {
          const updatedCurrent = { ...currentUser, role: newRole };
          setCurrentUser(updatedCurrent);
          onUserUpdate(updatedCurrent);
        }
        setMessage(`Роль ${username} изменена на ${ROLE_LABEL[newRole] || newRole}`);
      };

      const handleDeleteUser = (username) => {
        if (username === currentUser.username) { setMessage('Нельзя удалить себя'); return; }
        const target = users.find(u => u.username === username);
        if (!target) return;
        // Protect owner
        if (target.role === 'owner') { setMessage('Нельзя удалить владельца'); return; }
        // Permission check
        if (!canManage(currentUser.role, target.role, 'player')) {
          setMessage('У вас недостаточно прав для удаления этого пользователя');
          return;
        }
        saveUsers(users.filter(u => u.username !== username));
        refreshUsers();
        setMessage(`Пользователь ${username} удалён`);
      };

      const handleResetScore = (username) => {
        const updatedUsers = users.map(u => u.username === username ? { ...u, score: 0 } : u);
        saveUsers(updatedUsers);
        refreshUsers();
        if (username === currentUser.username) {
          setCurrentUser({ ...currentUser, score: 0 });
          onUserUpdate({ ...currentUser, score: 0 });
        }
        setMessage(`Очки ${username} обнулены`);
      };

      const handleMute = (username) => {
        const target = users.find(u => u.username === username);
        // Protect owner from mute
        if (target?.role === 'owner' && currentUser.role !== 'owner') {
          setMessage('Нельзя замутить владельца');
          return;
        }
        if (!canManage(currentUser.role, target?.role, 'player')) {
          setMessage('У вас недостаточно прав для мута');
          return;
        }
        const reason = prompt('Введите причину мута:');
        if (reason === null) return;
        const updatedUser = users.find(u => u.username === username);
        if (updatedUser) {
          updatedUser.muted = true;
          updatedUser.muteReason = reason;
        }
        const updatedUsers = users.map(u => u.username === username ? { ...u, muted: true, muteReason: reason } : u);
        saveUsers(updatedUsers);
        if (updatedUser) saveUserToFirebase(updatedUser);
        refreshUsers();
        if (username === currentUser.username) {
          setCurrentUser({ ...currentUser, muted: true, muteReason: reason });
          onUserUpdate({ ...currentUser, muted: true, muteReason: reason });
        }
        setMessage(`${username} получил мут`);
      };

      const handleUnmute = (username) => {
        const target = users.find(u => u.username === username);
        // Protect owner from unmute restrictions
        if (target?.role === 'owner' && target?.muted) {
          setMessage('Владелец не может быть замучен');
          return;
        }
        if (!canManage(currentUser.role, target?.role, 'player')) {
          setMessage('У вас недостаточно прав для размуты');
          return;
        }
        const updatedUser = users.find(u => u.username === username);
        if (updatedUser) {
          updatedUser.muted = false;
          updatedUser.muteReason = '';
        }
        const updatedUsers = users.map(u => u.username === username ? { ...u, muted: false, muteReason: '' } : u);
        saveUsers(updatedUsers);
        if (updatedUser) saveUserToFirebase(updatedUser);
        refreshUsers();
        if (username === currentUser.username) {
          setCurrentUser({ ...currentUser, muted: false, muteReason: '' });
          onUserUpdate({ ...currentUser, muted: false, muteReason: '' });
        }
        setMessage(`${username} размучен`);
      };

      const handleAddCoins = () => {
        const userToAdd = users.find(u => u.username === addCoinUser);
        if (!userToAdd || !addCoinAmount) {
          setMessage('Пользователь не найден или сумма не указана');
          return;
        }
        const amount = parseInt(addCoinAmount, 10);
        if (isNaN(amount) || amount <= 0) {
          setMessage('Неверная сумма');
          return;
        }
        const updatedUser = users.find(u => u.username === addCoinUser);
        if (updatedUser) {
          updatedUser.balance = (updatedUser.balance || 0) + amount;
        }
        const updatedUsers = users.map(u => u.username === addCoinUser ? { ...u, balance: (u.balance || 0) + amount } : u);
        saveUsers(updatedUsers);
        if (updatedUser) saveUserToFirebase(updatedUser);
        refreshUsers();
        setAddCoinUser('');
        setAddCoinAmount('');
        setMessage(`Начислено ${amount} DOMBRO пользователю ${addCoinUser}`);
      };

      const toggleInfinitePaint = () => {
        const newValue = !infinitePaint;
        setInfinitePaintState(newValue);
        setInfinitePaint(newValue);
      };

      const handleReportStatusChange = (reportId, newStatus) => {
        const updatedReports = reports.map(r => r.id === reportId ? { ...r, status: newStatus } : r);
        setReports(updatedReports);
        saveReports(updatedReports);
      };

      return (
        <div className="admin-panel">
          <h2>Админ-панель</h2>
          {message && <div className="admin-message">{message}</div>}
          <div className="admin-tabs">
            <button className={`admin-tab ${activeTab === 'users' ? 'active' : ''}`} onClick={() => setActiveTab('users')}>👥 Пользователи</button>
            <button className={`admin-tab ${activeTab === 'admins' ? 'active' : ''}`} onClick={() => setActiveTab('admins')}>🛡️ Админы</button>
            <button className={`admin-tab ${activeTab === 'owner' ? 'active' : ''}`} onClick={() => setActiveTab('owner')}>👑 Владелец</button>
            <button className={`admin-tab ${activeTab === 'functions' ? 'active' : ''}`} onClick={() => setActiveTab('functions')}>⚙️ Функции</button>
            <button className={`admin-tab ${activeTab === 'reports' ? 'active' : ''}`} onClick={() => setActiveTab('reports')}>📋 Репорты</button>
          </div>

          {activeTab === 'users' && (
            <div className="user-list">
              <h3>Список пользователей</h3>
              <table className="user-table">
                <thead>
                  <tr>
                    <th>Ник</th>
                    <th>Роль</th>
                    <th>Очки</th>
                    <th>Мут</th>
                    <th>Действия</th>
                  </tr>
                </thead>
                <tbody>
                  {users.sort((a, b) => {
                    // Owner always first
                    if (a.role === 'owner') return -1;
                    if (b.role === 'owner') return 1;
                    // Then admins
                    if (isAdminRole(a.role) && !isAdminRole(b.role)) return -1;
                    if (!isAdminRole(a.role) && isAdminRole(b.role)) return 1;
                    return 0;
                  }).map(u => (
                    <tr key={u.username}>
                      <td>{u.role === 'owner' ? '👑 ' : ''}{u.username}</td>
                      <td><span className={`role-badge ${u.role}`}>{u.role === 'owner' ? '👑 Владелец' : ROLE_LABEL[u.role] || 'Юзер'}</span></td>
                      <td>{u.score || 0}</td>
                      <td>{u.muted ? `🔇 ${u.muteReason}` : '✅'}</td>
                      <td className="actions-cell">
                        {u.role === 'owner' && <span>Владелец сервера</span>}
                        {u.role !== 'owner' && u.username !== currentUser.username && (
                          <>
                            {u.role === 'user' ? (
                              <button className="action-small-btn promote" onClick={() => handleChangeRole(u.username, 'admin')}>Повысить</button>
                            ) : (
                              <button className="action-small-btn demote" onClick={() => handleChangeRole(u.username, 'user')}>Понизить</button>
                            )}
                            <button className="action-small-btn danger" onClick={() => handleDeleteUser(u.username)}>Удалить</button>
                            <button className="action-small-btn" onClick={() => handleResetScore(u.username)}>Обнулить очки</button>
                            {u.muted ? (
                              <button className="action-small-btn" onClick={() => handleUnmute(u.username)}>Размутить</button>
                            ) : (
                              <button className="action-small-btn" onClick={() => handleMute(u.username)}>Мут</button>
                            )}
                          </>
                        )}
                        {u.username === currentUser.username && u.role !== 'owner' && <span>Это вы</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <div className="admin-add-coins">
                <h3>Начислить DOMBRO</h3>
                <input type="text" className="admin-input" placeholder="Никнейм" value={addCoinUser} onChange={e => setAddCoinUser(e.target.value)} />
                <input type="number" className="admin-input" placeholder="Сумма" value={addCoinAmount} onChange={e => setAddCoinAmount(e.target.value)} />
                <button className="admin-add-btn" onClick={handleAddCoins}>Начислить</button>
              </div>
            </div>
          )}

          {activeTab === 'admins' && (
            <div className="admins-list">
              <h3>Админы</h3>
              { !isAdminRole(currentUser.role) && currentUser.role !== 'owner' ? (
                <p>Только для админов</p>
              ) : (
                <table className="user-table">
                  <thead><tr><th>Ник</th><th>Роль</th><th>Действия</th></tr></thead>
                  <tbody>
                    {users.filter(u => isAdminRole(u.role) || u.role === 'owner').sort((a,b) => (ROLE_RANK[b.role]||0)-(ROLE_RANK[a.role]||0)).map(u => (
                      <tr key={u.username}>
                        <td>{u.role === 'owner' ? '👑 ' : ''}{u.username}</td>
                        <td><span className={`role-badge ${u.role}`}>{ROLE_LABEL[u.role] || u.role}</span></td>
                        <td>
                          {u.role === 'owner' && <span>Владелец сервера</span>}
                          {u.role !== 'owner' && (
                            <>
                              <select value={u.role} onChange={e => handleChangeRole(u.username, e.target.value)}>
                                <option value={u.role}>{ROLE_LABEL[u.role] || u.role}</option>
                                {availablePromotionRoles(currentUser.role).map(r => (
                                  <option key={r} value={r}>{ROLE_LABEL[r]}</option>
                                ))}
                                <option value="player">Снять администратора</option>
                              </select>
                            </>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          )}

          {activeTab === 'owner' && (
            <div className="owner-panel">
              {currentUser.role === 'owner' ? (
                <div><h3>Владелец</h3><p>Владелец пока-что отдыхает</p></div>
              ) : (
                <p>Только для владельца</p>
              )}
            </div>
          )}

          {activeTab === 'functions' && (
            <div className="functions-list">
              <h3>Функции</h3>
              <div className="function-item">
                <div className="function-info">
                  <span className="function-name">🎨 Бесконечная краска</span>
                  <span className="function-desc">Админы без кулдауна</span>
                </div>
                <button className={`function-toggle ${infinitePaint ? 'on' : 'off'}`} onClick={toggleInfinitePaint}>{infinitePaint ? 'Вкл' : 'Выкл'}</button>
              </div>
            </div>
          )}

          {activeTab === 'reports' && (
            <div className="reports-list">
              <h3>Репорты</h3>
              {reports.length === 0 ? <p>Пока нет</p> : (
                <table className="user-table">
                  <thead>
                    <tr>
                      <th>Автор</th>
                      <th>Сообщение</th>
                      <th>Время</th>
                      <th>Статус</th>
                    </tr>
                  </thead>
                  <tbody>
                    {reports.map(r => (
                      <tr key={r.id}>
                        <td>{r.author}</td>
                        <td>{r.text}</td>
                        <td>{new Date(r.timestamp).toLocaleString()}</td>
                        <td>
                          <select value={r.status} onChange={e => handleReportStatusChange(r.id, e.target.value)} className="status-select">
                            <option value="unread">Не прочитано</option>
                            <option value="approved">Одобрено</option>
                            <option value="pending">На рассмотрении</option>
                            <option value="rejected">Отказано</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          )}
        </div>
      );
    };

    // --------------- Страница Репорта ---------------
    const ReportPage = ({ onClose, user, setNotify }) => {
      const [tab, setTab] = useState('submit');
      const [text, setText] = useState('');
      const [reports, setReports] = useState(loadReports());

      const handleSubmit = () => {
        if (!text.trim()) return;
        const now = Date.now();
        const userReports = reports.filter(r => r.author === user.username);
        if (userReports.length > 0) {
          const last = Math.max(...userReports.map(r => r.timestamp));
          if (now - last < 3 * 60 * 1000) {
            setNotify({ message: 'Подождите 3 минуты' });
            return;
          }
        }
        const newReport = { id: now + Math.random(), author: user.username, text: text.trim(), timestamp: now, status: 'unread' };
        const updated = [...reports, newReport];
        setReports(updated);
        saveReports(updated);
        setText('');
        setNotify({ message: 'Репорт отправлен' });
      };

      const myReports = reports.filter(r => r.author === user.username).sort((a, b) => b.timestamp - a.timestamp);
      const statusLabels = { unread: 'Не прочитано', pending: 'На рассмотрении', approved: 'Одобрено', rejected: 'Отказано' };

      return (
        <div className="report-page">
          <h2>Репорты</h2>
          <div className="report-tabs">
            <button className={`report-tab ${tab === 'submit' ? 'active' : ''}`} onClick={() => setTab('submit')}>Отправить</button>
            <button className={`report-tab ${tab === 'my' ? 'active' : ''}`} onClick={() => setTab('my')}>Мои репорты</button>
          </div>
          {tab === 'submit' && (
            <div className="report-submit">
              <p className="report-desc">Жалобы и идеи по улучшению DOM</p>
              <textarea className="report-textarea" placeholder="Опишите..." value={text} onChange={e => setText(e.target.value)} rows={6} />
              <div className="report-actions">
                <button className="modal-save-btn" onClick={handleSubmit}>Отправить</button>
                <button className="modal-cancel-btn" onClick={onClose}>Назад</button>
              </div>
            </div>
          )}
          {tab === 'my' && (
            <div className="my-reports">
              {myReports.length === 0 ? <p>У вас пока нет репортов</p> : (
                <table className="user-table">
                  <thead><tr><th>Сообщение</th><th>Время</th><th>Статус</th></tr></thead>
                  <tbody>
                    {myReports.map(r => (
                      <tr key={r.id}>
                        <td>{r.text}</td>
                        <td>{new Date(r.timestamp).toLocaleString()}</td>
                        <td><span className={`status-badge status-${r.status}`}>{statusLabels[r.status]}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
              <button className="modal-cancel-btn" style={{ marginTop: 15 }} onClick={onClose}>Назад</button>
            </div>
          )}
        </div>
      );
    };

    // --------------- Боковая панель + контент ---------------
    const SidebarLayout = ({ user, onLogout, onUserUpdate }) => {
      const [activeTab, setActiveTab] = useState('home');
      const [showSettings, setShowSettings] = useState(false);
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [showReport, setShowReport] = useState(false);
      const [notify, setNotify] = useState(null);

      const handleSaveProfile = (newUsername) => {
        const trimmed = newUsername.trim();
        if (!trimmed) return;
        const users = loadUsers();
        const idx = users.findIndex(u => u.username === user.username);
        if (idx !== -1) {
          if (users.find((u, i) => u.username === trimmed && i !== idx)) {
            setNotify({ message: 'Ник занят' });
            return;
          }
          users[idx].username = trimmed;
          saveUsers(users);
          user.username = trimmed;
          setCurrentUser(user);
          setNotify({ message: 'Ник сохранён' });
        }
        setShowProfileModal(false);
      };

      const renderContent = () => {
        if (showReport) return <ReportPage onClose={() => setShowReport(false)} user={user} setNotify={setNotify} />;
        switch (activeTab) {
          case 'home': return (
            <>
              <h1 className="dashboard-title">DOM</h1>
              <p className="dashboard-desc">Добро пожаловать, {user.displayName || user.username}. Новое поколение тебя уже ждёт!</p>
            </>
          );
          case 'battle': return <BattleCanvas initialColor={defaultColor} onExit={() => setActiveTab('home')} setNotify={setNotify} />;
          case 'top': return <FriendsPage />;
          case 'admin': return <AdminPanel currentUser={user} onUserUpdate={onUserUpdate} />;
          case 'dombro': return <DomBroShop user={user} onUserUpdate={onUserUpdate} />;
          case 'clans': return <ClanPage user={user} onUserUpdate={onUserUpdate} />;
          default: return null;
        }
      };

      return (
        <div className="main-layout">
          <div className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">DOM</div>
              <div className="sidebar-user">👤 {user.displayName || user.username}</div>
            </div>
            <nav className="sidebar-nav">
              <button className={`sidebar-btn ${activeTab === 'home' && !showReport ? 'active' : ''}`} onClick={() => { setActiveTab('home'); setShowReport(false); }}>🏠 Дом</button>
              {((user.role && user.role !== 'user' && user.role !== 'player')) ? (
                <button className={`sidebar-btn ${activeTab === 'battle' ? 'active' : ''}`} onClick={() => { setActiveTab('battle'); setShowReport(false); }}>⚔️ Pixel Battle</button>
              ) : (
                <div className="sidebar-btn-locked" title="в разработке...">
                  <span className="lock-overlay">🚧</span>
                  ⚔️ Pixel Battle
                </div>
              )}
              {((user.role && user.role !== 'user' && user.role !== 'player')) && (
                <button className={`sidebar-btn ${activeTab === 'admin' && !showReport ? 'active' : ''}`} onClick={() => { setActiveTab('admin'); setShowReport(false); }}>🔧 Админ-панель</button>
              )}
              <button className={`sidebar-btn ${showReport ? 'active' : ''}`} onClick={() => { setShowReport(true); setActiveTab(''); }}>📋 Репорт</button>
              <button className={`sidebar-btn ${activeTab === 'top' && !showReport ? 'active' : ''}`} onClick={() => { setActiveTab('top'); setShowReport(false); }}>🍋‍🟩Друзья</button>
              <button className={`sidebar-btn ${activeTab === 'clans' && !showReport ? 'active' : ''}`} onClick={() => { setActiveTab('clans'); setShowReport(false); }}>⚔️ Кланы</button>
              <div className="sidebar-settings">
                <button className="sidebar-btn" onClick={() => setShowSettings(!showSettings)}>⚙️ Настройки</button>
                {showSettings && (
                  <div className="settings-submenu">
                    <button onClick={() => { setShowProfileModal(true); setShowSettings(false); }}>Изменить профиль</button>
                  </div>
                )}
              </div>
              <button className="sidebar-btn logout-btn" onClick={onLogout}>❌ Выйти</button>
            </nav>
            <div className="sidebar-dombro">
              <button className={`sidebar-btn ${activeTab === 'dombro' && !showReport ? 'active' : ''}`} onClick={() => { setActiveTab('dombro'); setShowReport(false); }}>
                💰 DOMBRO
              </button>
              <span className="sidebar-balance">{user.balance || 0} DC</span>
            </div>
            <div className="sidebar-footer">
              <span>DOM v1.1</span>
            </div>
          </div>
          <div className="content-area">
            {renderContent()}
          </div>

          {showProfileModal && (
            <ProfileModal currentUsername={user.username} onSave={handleSaveProfile} onClose={() => setShowProfileModal(false)} />
          )}

          {notify && <Notification message={notify.message} onClose={() => setNotify(null)} />}
        </div>
      );
    };

    // --------------- Холст (Battle) с зумом колесиком ---------------
    const COOLDOWN_MS = 30000; // 30 секунд
    const CELL_SIZE = 11;
    const GRID_SIZE = 93;
    const BASE_SIZE = GRID_SIZE * CELL_SIZE; // 1023

    const BattleCanvas = ({ initialColor, onExit, setNotify }) => {
      const currentUser = getCurrentUser() || { username: 'Аноним', role: 'user', clan: null, muted: false, muteReason: '' };
      const canvasRef = useRef(null);
      const wrapperRef = useRef(null);
      const chatRef = useRef(null);
      const [grid, setGrid] = useState(loadCanvas());
      const [cooldownLeft, setCooldownLeft] = useState(0);
      const [zoom, setZoom] = useState(1.0);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const [tooltip, setTooltip] = useState({ show: false, x: 0, y: 0, text: '', clan: '' });
      const [currentColor, setCurrentColor] = useState(initialColor);
      const [showColorPanel, setShowColorPanel] = useState(false);
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const dragStart = useRef({ x: 0, y: 0 });
      const startOffset = useRef({ x: 0, y: 0 });
      const minZoomRef = useRef(1.0);
      const isInitializedRef = useRef(false);

      
      const isAdmin = currentUser && currentUser.role && currentUser.role !== 'user' && currentUser.role !== 'player';
      const infinitePaintEnabled = getInfinitePaint() && isAdmin;
      const minZoom = 1.0;
      const maxZoom = 5.0;

// Инициализация без масштабирования - холст полного размера
useEffect(() => {
  const wrapper = wrapperRef.current;
  if (!wrapper || isInitializedRef.current) return;
  const rect = wrapper.getBoundingClientRect();
  if (rect.width && rect.height) {
    setZoom(1.0);
    setOffset({ x: 0, y: 0 });
    isInitializedRef.current = true;
  }
}, []);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [chatMessages]);

      useEffect(() => {
        if (infinitePaintEnabled) {
          setCooldownLeft(0);
          return;
        }
        const updateCooldown = () => {
          const last = getLastPixelTime();
          const now = Date.now();
          setCooldownLeft(now - last >= COOLDOWN_MS ? 0 : COOLDOWN_MS - (now - last));
        };
        updateCooldown();
        const timer = setInterval(updateCooldown, 200);
        return () => clearInterval(timer);
      }, [infinitePaintEnabled]);

      const addChatMessage = useCallback((msg) => {
        setChatMessages(prev => [...prev, { ...msg, timestamp: Date.now() }]);
      }, []);

      const clampOffset = useCallback((off, z, wW, wH) => {
  const scaledW = BASE_SIZE * z;
  const scaledH = BASE_SIZE * z;
  // Позволяем центрировать, если холст меньше контейнера
  const maxX = Math.max(0, (wW - scaledW) / 2);
  const minX = Math.min(0, wW - scaledW);
  const maxY = Math.max(0, (wH - scaledH) / 2);
  const minY = Math.min(0, wH - scaledH);
  return {
    x: Math.min(maxX, Math.max(minX, off.x)),
    y: Math.min(maxY, Math.max(minY, off.y)),
  };
}, []);

      const getWrapperSize = useCallback(() => {
        const w = wrapperRef.current;
        if (!w) return { w: 800, h: 600 };
        const r = w.getBoundingClientRect();
        return { w: r.width, h: r.height };
      }, []);

      const drawGrid = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = BASE_SIZE;
        canvas.height = BASE_SIZE;
        ctx.clearRect(0, 0, BASE_SIZE, BASE_SIZE);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, BASE_SIZE, BASE_SIZE);
        for (let row = 0; row < GRID_SIZE; row++) {
          for (let col = 0; col < GRID_SIZE; col++) {
            const cell = grid[row]?.[col];
            ctx.fillStyle = cell?.color || '#e0e0e0';
            ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            ctx.strokeStyle = '#444';
            ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
      }, [grid]);

      
      useEffect(() => { drawGrid(); }, [drawGrid]);

      const getCanvasCoords = (e) => {
        const wrapper = wrapperRef.current;
        if (!wrapper) return null;
        const rect = wrapper.getBoundingClientRect();
        const mx = e.clientX - rect.left - offset.x;
        const my = e.clientY - rect.top - offset.y;
        return {
          col: Math.floor(mx / (CELL_SIZE * zoom)),
          row: Math.floor(my / (CELL_SIZE * zoom))
        };
      };

      const addScore = () => {
        const users = loadUsers();
        const idx = users.findIndex(u => u.username === currentUser.username);
        if (idx !== -1) {
          users[idx].score = (users[idx].score || 0) + 1;
          saveUsers(users);
          setCurrentUser({ ...currentUser, score: users[idx].score });
        }
      };

      const placePixel = (e) => {
        if (!infinitePaintEnabled && cooldownLeft > 0) {
          setNotify({ message: `Подожди ещё ${Math.ceil(cooldownLeft / 1000)} сек.` });
          return;
        }
        const coords = getCanvasCoords(e);
        if (!coords) return;
        const { col, row } = coords;
        if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;

        const newGrid = grid.map(r => [...r]);
        newGrid[row][col] = {
          color: currentColor,
          author: currentUser?.username || 'Аноним',
          clan: currentUser?.clan || null
        };
        setGrid(newGrid);
        saveCanvas(newGrid);
        addScore();
        if (!infinitePaintEnabled) {
          setLastPixelTime(Date.now());
          setCooldownLeft(COOLDOWN_MS);
        }
      };

      const handleMouseDown = (e) => {
        if (e.button !== 0) return;
        if (zoom <= 1.01) return;
        setIsDragging(true);
        dragStart.current = { x: e.clientX, y: e.clientY };
        startOffset.current = { ...offset };
        e.preventDefault();
      };

      const handleMouseMove = (e) => {
        const coords = getCanvasCoords(e);
        if (coords && coords.row >= 0 && coords.row < GRID_SIZE && coords.col >= 0 && coords.col < GRID_SIZE) {
          const cell = grid[coords.row]?.[coords.col];
          if (cell?.author) {
            setTooltip({
              show: true,
              x: e.clientX + 15,
              y: e.clientY + 15,
              text: cell.author,
              clan: cell.clan || ''
            });
          } else {
            setTooltip({ show: false, text: '', clan: '' });
          }
        } else {
          setTooltip({ show: false, text: '', clan: '' });
        }

        if (!isDragging) return;
        const dx = e.clientX - dragStart.current.x;
        const dy = e.clientY - dragStart.current.y;
        let newOff = {
          x: startOffset.current.x + dx,
          y: startOffset.current.y + dy,
        };
        const { w, h } = getWrapperSize();
        newOff = clampOffset(newOff, zoom, w, h);
        setOffset(newOff);
      };

      const handleMouseUp = (e) => {
        if (!isDragging) {
          placePixel(e);
        }
        setIsDragging(false);
      };

      const handleMouseLeave = () => {
        setIsDragging(false);
        setTooltip({ show: false, text: '', clan: '' });
      };

      // Зум колесиком
      const handleWheel = useCallback((e) => {
  e.preventDefault();
  const wrapper = wrapperRef.current;
  if (!wrapper) return;
  const rect = wrapper.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const newZoom = zoom * (e.deltaY < 0 ? 1.1 : 0.9);
  if (newZoom < 1.0 || newZoom > 5.0) return;

  const worldX = (mouseX - offset.x) / zoom;
  const worldY = (mouseY - offset.y) / zoom;

  const newOffsetX = mouseX - worldX * newZoom;
  const newOffsetY = mouseY - worldY * newZoom;
  const { w, h } = getWrapperSize();
  const clamped = clampOffset({ x: newOffsetX, y: newOffsetY }, newZoom, w, h);
  setZoom(newZoom);
  setOffset(clamped);
}, [zoom, offset, clampOffset, getWrapperSize]);

      const handleChangeColor = (newColor) => {
        setCurrentColor(newColor);
        setShowColorPanel(false);
      };

      const handleSendMessage = (e) => {
        e.preventDefault();
        if (currentUser?.muted) {
          setNotify({ message: `У вас мут, по причине: ${currentUser.muteReason}` });
          return;
        }
        const text = chatInput.trim();
        if (!text) return;
        addChatMessage({ type: 'user', text, author: currentUser.username });
        setChatInput('');
      };

      return (
        <div className="battle-layout">
          <div className="battle-main">
            <div className="battle-top-bar">
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div className="current-color-swatch" style={{ backgroundColor: currentColor }} />
                <h2>Текущий цвет</h2>
              </div>
              <button className="icon-btn" onClick={() => setShowColorPanel(!showColorPanel)} title="Выбрать цвет">🎨</button>
            </div>

            <div className="timer">
              {infinitePaintEnabled ? '∞ Бесконечная краска' : (
                cooldownLeft <= 0 ? 'МОЖНО СТАВИТЬ ПИКСЕЛЬ' : `Следующий через ${Math.ceil(cooldownLeft/1000)}с`
              )}
            </div>

            <div
              ref={wrapperRef}
              className={`canvas-zoom-wrapper ${isDragging ? 'dragging' : ''}`}
              onWheel={handleWheel}
              onMouseDown={handleMouseDown}
              onMouseMove={handleMouseMove}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseLeave}
            >
              <canvas
                ref={canvasRef}
                className="pixel-canvas"
                style={{
                  width: BASE_SIZE + 'px',
                  height: BASE_SIZE + 'px',
                  transform: `translate(${offset.x}px, ${offset.y}px) scale(${zoom})`,
                }}
              />
            </div>

            <div className="battle-bottom-bar">
              <button className="battle-action-btn" onClick={onExit}><span className="action-icon">❌</span> Выйти</button>
              {isAdmin && (
                <button className="battle-action-btn" onClick={() => {
                  const newGrid = emptyGrid();
                  setGrid(newGrid);
                  saveCanvas(newGrid);
                }}><span className="action-icon">🗑️</span> Сбросить всё</button>
              )}
            </div>
          </div>

          <div className="right-panel">
            {showColorPanel ? (
              <div className="color-panel">
                <h3>Выбери цвет</h3>
                <div className="color-palette">
                  {colorPalette.map((row, i) => (
                    <div className="color-row" key={i}>
                      {row.map(color => (
                        <div
                          key={color}
                          className={`color-swatch ${currentColor === color ? 'selected' : ''}`}
                          style={{ backgroundColor: color }}
                          onClick={() => handleChangeColor(color)}
                          title={color}
                        />
                      ))}
                    </div>
                  ))}
                </div>
                <button className="color-close-btn" onClick={() => setShowColorPanel(false)}>Продолжить</button>
              </div>
            ) : (
              <div className="chat-panel">
                <div className="chat-header">💬 Чат</div>
                <div className="chat-messages" ref={chatRef}>
                  {chatMessages.map((msg, i) => (
                    <div key={i} className={`chat-msg ${msg.type}`}>
                      <span className="chat-time">{new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</span>
                      {msg.type === 'user' ? (
                        <><span className="chat-author">{msg.author}:</span> {msg.text}</>
                      ) : (
                        <span className="system-text">{msg.text}</span>
                      )}
                    </div>
                  ))}
                </div>
                <form className="chat-input-area" onSubmit={handleSendMessage}>
                  {currentUser?.muted ? (
                    <div className="mute-notice">🔇 У вас мут, по причине: {currentUser.muteReason}</div>
                  ) : (
                    <>
                      <input type="text" className="chat-input" placeholder="Введите сообщение..." value={chatInput} onChange={e => setChatInput(e.target.value)} />
                      <button type="submit" className="chat-send-btn" title="Отправить">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <line x1="22" y1="2" x2="11" y2="13"></line>
                          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                      </button>
                    </>
                  )}
                </form>
              </div>
            )}
          </div>

          {tooltip.show && (
            <div className="pixel-tooltip" style={{ left: tooltip.x, top: tooltip.y }}>
              <div>{tooltip.text}</div>
              {tooltip.clan && <div className="tooltip-clan">Клан: {tooltip.clan}</div>}
            </div>
          )}
        </div>
      );
    };

    // --------------- Модальное окно профиля ---------------
    const ProfileModal = ({ currentUsername, onSave, onClose }) => {
      const [username, setUsername] = useState(currentUsername);
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <h3>Изменить профиль</h3>
            <input type="text" className="profile-input" value={username} onChange={e => setUsername(e.target.value)} placeholder="Новый ник" />
            <div style={{ display: 'flex', gap: 10, marginTop: 15, justifyContent: 'center' }}>
              <button className="modal-save-btn" onClick={() => onSave(username)}>Сохранить</button>
              <button className="modal-cancel-btn" onClick={onClose}>Отмена</button>
            </div>
          </div>
        </div>
      );
    };

    // --------------- Главный App ---------------
    const App = () => {
      const [screen, setScreen] = useState('menu');
      const [user, setUser] = useState(getCurrentUser());

      useEffect(() => {
        if (user) setScreen('dashboard');
      }, [user]);

      const handleLogin = (loggedUser) => {
        setUser(loggedUser);
        setScreen('dashboard');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setUser(null);
        setScreen('menu');
      };

      const handleUserUpdate = (updatedUser) => setUser(updatedUser);

      return (
        <div className="app">
          {screen === 'menu' && <MainMenu onStart={handleLogin} />}
          {screen === 'dashboard' && (
            <SidebarLayout user={user} onLogout={handleLogout} onUserUpdate={handleUserUpdate} />
          )}
        </div>
      );
    };

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      console.log('✓ React app mounted successfully');
    } catch (error) {
      console.error('✗ React render error:', error);
      document.getElementById('root').innerHTML = '<div style="color: red; padding: 20px; font-family: monospace;">Ошибка при загрузке приложения. Проверьте консоль (F12).</div>';
    }
  </script>
</body>
</html>
